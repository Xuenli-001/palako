<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio | Sakha</title>
    <style>
        /* Pengaturan Tema dan Warna */
        :root { 
            --bg-color: #0f172a; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8;
            --accent: #38bdf8; 
            --card-bg: #1e293b; 
            --card-border: #334155;
        }

        /* Reset Dasar */
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            line-height: 1.6; 
        }

        /* Bagian Header (Hero Section) */
        header { 
            padding: 5rem 2rem; 
            text-align: center; 
            border-bottom: 1px solid var(--card-border); 
            background: linear-gradient(180deg, #020617 0%, var(--bg-color) 100%);
        }
        header h1 { 
            font-size: 3.5rem; 
            margin: 0; 
            color: var(--accent); 
            letter-spacing: 2px;
        }
        header p.subtitle { 
            font-size: 1.2rem; 
            color: var(--text-muted); 
            max-width: 600px;
            margin: 1rem auto 0 auto;
        }

        /* Container Utama */
        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 3rem 2rem; 
        }
        
        h2 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }

        p.about-text {
            font-size: 1.1rem;
            color: #cbd5e1;
            margin-bottom: 3rem;
        }

        /* Grid Layout untuk Kartu Proyek */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 2rem; 
        }

        /* Desain Kartu (Card) */
        .card { 
            background-color: var(--card-bg); 
            padding: 1.8rem; 
            border-radius: 12px; 
            border: 1px solid var(--card-border); 
            transition: all 0.3s ease; 
        }
        .card:hover { 
            transform: translateY(-8px); 
            border-color: var(--accent); 
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.1);
        }
        .card h3 { 
            margin-top: 0; 
            color: var(--text-main); 
            font-size: 1.4rem;
        }
        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Label/Tag Bahasa Pemrograman */
        .tags { 
            display: flex; 
            gap: 0.5rem; 
            flex-wrap: wrap; 
            margin-top: 1.5rem; 
        }
